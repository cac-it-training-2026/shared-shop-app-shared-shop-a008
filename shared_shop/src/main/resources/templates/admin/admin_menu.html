<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_3block :: layout(~{::title},~{::body/content()})}">

<head>
	<meta charset="UTF-8" />
	<title th:text="#{admin.menu}+' | '+ #{shop.title}"> </title>
</head>

<body class="admin">
	<div class="admin_menu_container">
		<h2 class="title admin-menu-title" th:text="#{admin.menu}"></h2>

		<ul class="admin_menu_list">
			<li>
				<div class="title_area" th:text="#{admin.menu.user.list}"></div>
				<div class="link_area">
					<a th:href="@{/admin/user/list}" th:text="#{admin.menu.user.list}"></a>
				</div>
			</li>
			<th:block th:if="${session.user.authority == 1}">
				<li>
					<div class="title_area" th:text="#{admin.menu.order.list}"></div>
					<div class="link_area">
						<a th:href="@{/admin/order/list}" th:text="#{admin.menu.order.list}"></a>
					</div>
				</li>
				<li>
					<div class="title_area" th:text="#{admin.menu.item.list}"></div>
					<div class="link_area">
						<a th:href="@{/admin/item/list}" th:text="#{admin.menu.item.list}"></a>
					</div>
				</li>
				<li>
					<div class="title_area" th:text="#{admin.menu.category.list}"></div>
					<div class="link_area">
						<a th:href="@{/admin/category/list}" th:text="#{admin.menu.category.list}"></a>
					</div>
				</li>
			</th:block>
		</ul>
	</div>
</body>

</html>
