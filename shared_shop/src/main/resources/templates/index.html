<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">
<head>
<title th:text="#{top}+' | '+ #{shop.title}"> </title>
<meta charset="UTF-8" />
</head>
<body class="user index">
	<div class="main_header">
		<h2 class="title">
				<span th:if="${sortType==1}" th:text="#{sort.latest.title}"></span>
				<span th:if="${sortType==2 || sortType==null}" th:text="#{sort.hotsell.title}"></span>
		</h2>
	</div>

	<p th:text="#{msg.client.item.list.none}" th:if="${#lists.isEmpty(items)}"></p>

	<div class="item_list" th:if="!${#lists.isEmpty(items)}">
		<div class="item" th:each="item, status: ${items}" th:if="${status.count le 10}">
			<!--/* 1件分の商品情報 (カードレイアウト) */-->
			<a th:href="@{/client/item/detail/{id}(id=${item.id})}" class="item_link">
				<div class="item_image_container">
					<img th:src="@{/images/{image}(image=${item.image})}" th:if="${item.image != null}" />
					<img th:src="@{/images/common/no_image.jpg}" th:if="${item.image == null}" />
				</div>
				<div class="item_info">
					<div class="item_name" th:text="${item.name}"></div>
					<div class="item_price">
						¥<span th:text="${#numbers.formatInteger(item.price, 1, 'COMMA')}"></span>
					</div>
				</div>
			</a>
		</div>
	</div>
</body>
</html>
