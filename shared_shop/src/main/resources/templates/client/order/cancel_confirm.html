<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{order}+'キャンセル確認 | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body class="user">
	<h2 th:class="title" th:text="#{order}+'キャンセル確認'"></h2>

	<p class="msg" th:text="#{msg.order.cancel.check}"></p>

	<div class="info_form_area">
		<table class="detail_table payment">
			<tr>
				<th>[[#{data.client.order.date}]]</th>
				<td th:text="${order.insertDate}"></td>
			</tr>
			<tr>
				<th>[[#{paymethod.str}]]</th>
				<td th:switch="${order.payMethod}">
					<span th:case="1">[[#{paymethod.credit.str}]]</span>
					<span th:case="2">[[#{paymethod.bank.str}]]</span>
					<span th:case="3">[[#{paymethod.onarrival.str}]]</span>
					<span th:case="4">[[#{paymethod.emoney.str}]]</span>
					<span th:case="5">[[#{paymethod.convenience.str}]]</span>
				</td>
			</tr>
			<tr>
				<th>[[#{data.total.price}]]</th>
				<td th:text="${order.total}"></td>
			</tr>
		</table>

		<div class="detail_button_area">
			<form th:action="@{/client/order/cancel/{id}(id=${order.id})}" method="post" style="display: inline;">
				<input type="submit" value="キャンセル確定" class="delete_button" />
			</form>
			<form th:action="@{/client/order/detail/{id}(id=${order.id})}" method="get" style="display: inline;">
				<input type="submit" value="戻る" class="back_button" />
			</form>
		</div>
	</div>
</body>

</html>
