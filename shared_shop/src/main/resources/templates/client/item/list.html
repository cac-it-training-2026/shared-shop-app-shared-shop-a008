<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{item}+#{title.list}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body th:object="${loginForm}" class="user item_list">

	<h2 th:class="title" th:text="#{item}+#{title.list}"></h2>

	<!-- 検索フォーム -->
	<div class="search_form">
		<form th:action="@{/client/item/list/1}" method="get">
			<input type="text" name="keyword" th:value="${keyword}" placeholder="商品名を検索" />
			<input type="hidden" name="categoryId" th:value="${categoryId}" />
			<input type="submit" value="検索" />
		</form>
	</div>

	<div class="sorted_by">
		<span th:if="${sortType==1}" th:text="#{sort.latest.str}"></span>
		<a th:unless="${sortType==1}" th:href="@{/client/item/list/1(categoryId=${categoryId}, keyword=${keyword})}"
			th:text="#{sort.latest.str}"></a>
		<span th:if="${sortType==2}" th:text="#{sort.hotsell.str}"></span>
		<a th:unless="${sortType==2}" th:href="@{/client/item/list/2(categoryId=${categoryId}, keyword=${keyword})}"
			th:text="#{sort.hotsell.str}"></a>

		<p th:if="${#lists.isEmpty(items) and keyword != null}" th:text="'「' + ${keyword} + '」に一致する商品はありません。'"></p>
		<p th:if="${#lists.isEmpty(items) and keyword == null}" th:text="#{msg.client.item.list.none}"></p>

	</div>


	<div class="item_list" th:if="!${#lists.isEmpty(items)}">
		<!--/* 商品一覧 */-->
		<th:block th:each="item, status: ${items}">
			<a th:href="@{/client/item/detail/{id}(id=${item.id})}" class="item">
				<div class="item_image">
					<img th:src="@{/images/{image}(image=${item.image})}" th:if="${item.image != null}" />
					<img th:src="@{/images/common/no_image.jpg}" th:if="${item.image == null}" />
				</div>
				<div class="item_info">
					<span class="item_category" th:text="${item.categoryName}"></span>
					<span class="item_name" th:text="${item.name}"></span>
					<span class="item_price" th:text="'¥' + ${#numbers.formatInteger(item.price, 1, 'COMMA')}"></span>
				</div>
			</a>
		</th:block>
	</div>

</body>

</html>
