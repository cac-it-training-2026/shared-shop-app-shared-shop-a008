<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{item}+#{title.list}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body class="user item_list_page">

	<h2 class="title" th:text="#{item}+#{title.list}"></h2>

	<div class="sorted_by" style="margin-bottom: 20px;">
		<span th:if="${sortType==1}" class="text-bold" th:text="#{sort.latest.str}"></span>
		<a th:unless="${sortType==1}" th:href="@{/client/item/list/1(categoryId=${categoryId})}"
			th:text="#{sort.latest.str}"></a>
		<span style="margin: 0 10px; color: #ccc;">|</span>
		<span th:if="${sortType==2}" class="text-bold" th:text="#{sort.hotsell.str}"></span>
		<a th:unless="${sortType==2}" th:href="@{/client/item/list/2(categoryId=${categoryId})}"
			th:text="#{sort.hotsell.str}"></a>
	</div>

	<p th:text="#{msg.client.item.list.none}" th:if="${#lists.isEmpty(items)}"></p>

	<div class="item_list" th:if="!${#lists.isEmpty(items)}">
		<!--/* 商品一覧 (カードレイアウト) */-->
		<div class="item" th:each="item: ${items}">
			<a th:href="@{/client/item/detail/{id}(id=${item.id})}" class="item_link">
				<div class="item_image_container">
					<img th:src="@{/images/{image}(image=${item.image})}" th:if="${item.image != null}" />
					<img th:src="@{/images/common/no_image.jpg}" th:if="${item.image == null}" />
				</div>
				<div class="item_info">
					<div class="item_name" th:text="${item.name}"></div>
					<div class="item_category" style="font-size: 0.8rem; color: #666; margin-bottom: 5px;" th:text="${item.categoryName}"></div>
					<div class="item_price">
						¥<span th:text="${#numbers.formatInteger(item.price, 1, 'COMMA')}"></span>
					</div>
				</div>
			</a>
		</div>
	</div>

</body>

</html>
