<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{item}+#{title.detail}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body class="user item_detail_page">

	<h2 class="title" th:text="#{item}+#{title.detail}"></h2>

	<div class="info_form_area" th:object="${item}">
		<div class="item_detail_area">
			<div class="item_image_area">
				<img th:if="*{image != null}" th:src="@{/images/{image}(image=*{image})}" alt="商品画像"></img>
				<img th:if="*{image == null}" th:src="@{/images/common/no_image.jpg}" alt="NO IMAGE"></img>
			</div>
			<div class="item_info_area">
				<dl class="item_detail_list">
					<dt>[[#{data.item.name}]]</dt>
					<dd class="text-bold item-detail-name" th:text="*{name}"></dd>

					<dt>[[#{data.item.price}]]</dt>
					<dd class="item_price item-detail-price">
						¥<span th:text="${#numbers.formatInteger(item.price, 1, 'COMMA')}"></span>
					</dd>

					<dt>[[#{data.item.stock}]]</dt>
					<dd th:if="*{stock > 5}" th:text="#{data.in.stock}"></dd>
					<dd th:if="*{stock >= 1 and 5 >= stock}" th:text="*{stock}"></dd>
					<dd th:if="*{stock == 0}" class="out-of-stock-text" th:text="#{data.out.of.stock}"></dd>

					<dt>[[#{data.category}]]</dt>
					<dd th:text="*{categoryName}"></dd>

					<dt>[[#{data.description}]]</dt>
					<dd th:text="*{description}"></dd>
				</dl>

				<div class="detail_button_area item-detail-actions">
					<form th:action="@{/client/basket/add}" method="post" class="user_info_form" th:if="*{stock > 0}">
						<input type="hidden" th:field="*{id}" />
						<input type="submit" th:value="#{basket}+'に入れる'" class="send_button full-width" />
					</form>
					<a th:href="@{/client/item/list/1}" class="button back_button" th:text="#{msg.back.to.top}"></a>
				</div>
			</div>
		</div>
	</div>

</body>

</html>
