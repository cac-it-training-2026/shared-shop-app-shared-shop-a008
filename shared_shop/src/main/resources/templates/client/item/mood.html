<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">
<head>
<title>気分で選ぶ商品診断 | シェアードショップ</title>
<meta charset="UTF-8" />
</head>
<body class="user mood">
	<h2 class="page_title">気分で選ぶ商品診断</h2>

	<!-- 未選択時 -->
	<div th:if="${mood == null}" class="message">
		<p>左側のメニューから気分を選んでください</p>
	</div>

	<!-- 結果セクション -->
	<div th:if="${mood != null}">
		<h3 class="diagnosis_result_title" th:text="${title}"></h3>

		<div th:if="${#lists.isEmpty(items)}">
			<p>おすすめの商品が見つかりませんでした。</p>
		</div>

		<div class="item_list" th:if="${not #lists.isEmpty(items)}">
			<th:block th:each="item : ${items}">
				<div class="item">
					<div class="item_name" th:text="${item.name}"></div>
					<a th:href="@{/client/item/detail/}+${item.id}">
						<img th:src="@{/images/{image}(image=${item.image})}" th:if="${item.image != null}" />
						<img th:src="@{/images/common/no_image.jpg}" th:if="${item.image == null}" />
					</a>
				</div>
			</th:block>
		</div>
	</div>

</body>
</html>
