<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title>気分で選ぶ | シェアードショップ</title>
	<meta charset="UTF-8" />
</head>

<body class="user mood_diagnosis">
	<h2 class="title">気分で選ぶ商品診断</h2>

	<div class="mood_selection_area">
		<p>今の気分は？</p>
		<form th:action="@{/client/item/mood}" method="get" class="mood_form">
			<button type="submit" name="mood" value="relax" class="mood_button" th:classappend="${selectedMood == 'relax'} ? 'active'">ゆっくりしたい</button>
			<button type="submit" name="mood" value="focus" class="mood_button" th:classappend="${selectedMood == 'focus'} ? 'active'">集中したい</button>
			<button type="submit" name="mood" value="energy" class="mood_button" th:classappend="${selectedMood == 'energy'} ? 'active'">元気を出したい</button>
			<button type="submit" name="mood" value="gift" class="mood_button" th:classappend="${selectedMood == 'gift'} ? 'active'">誰かに贈りたい</button>
		</form>
	</div>

	<th:block th:if="${selectedMood != null}">
		<hr />
		<h3 class="subtitle">あなたへのおすすめ</h3>

		<div th:if="${#lists.isEmpty(items)}">
			<p>おすすめできる商品がありません。</p>
		</div>

		<div class="item_list" th:if="${not #lists.isEmpty(items)}">
			<th:block th:each="item, status: ${items}">
				<div class="item">
					<div class="item_name" th:text="${item.name}"></div>
					<a th:href="@{/client/item/detail/{id}(id=${item.id})}">
						<img th:src="@{/images/{image}(image=${item.image})}" th:if="${item.image != null}" />
						<img th:src="@{/images/common/no_image.jpg}" th:if="${item.image == null}" />
					</a>
					<div class="item_info">
						<span th:text="'¥' + ${#numbers.formatInteger(item.price, 1, 'COMMA')}"></span>
						<span class="category_label" th:text="${item.categoryName}"></span>
					</div>
				</div>
			</th:block>
		</div>
	</th:block>

</body>

</html>
