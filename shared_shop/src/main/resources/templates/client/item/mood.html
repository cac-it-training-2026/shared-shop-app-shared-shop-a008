<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
    <title>気分で選ぶ商品診断 | シェアードショップ</title>
    <meta charset="UTF-8" />
</head>

<body class="user item_list">

	<h2 class="title">気分で選ぶ商品診断</h2>

	<!-- 未選択時 -->
	<div th:if="${mood == null}" class="message">
		<p>左側のメニューから気分を選んでください</p>
	</div>

	<!-- 結果セクション -->
	<div th:if="${mood != null}">
		<h3 class="diagnosis_result_title" th:text="${moodTitle}"></h3>

		<p th:text="#{msg.client.item.list.none}" th:if="${#lists.isEmpty(items)}"></p>

		<div class="item_list" th:if="!${#lists.isEmpty(items)}">
			<!--/* 商品一覧 */-->
			<th:block th:each="item : ${items}">
				<a th:href="@{/client/item/detail/{id}(id=${item.id})}" class="item">
					<div class="item_image">
						<img th:src="@{/images/{image}(image=${item.image})}" th:if="${item.image != null}" />
						<img th:src="@{/images/common/no_image.jpg}" th:if="${item.image == null}" />
					</div>
					<div class="item_info">
						<span class="item_category" th:text="${item.categoryName}"></span>
						<span class="item_name" th:text="${item.name}"></span>
						<span class="item_price" th:text="'¥' + ${#numbers.formatInteger(item.price, 1, 'COMMA')}"></span>
					</div>
				</a>
			</th:block>
		</div>
	</div>

</body>

</html>
